# Codecov configuration.
#
# The authoritative coverage gate lives in vitest (see `thresholds` in
# vitest.config.ts), which fails CI when coverage regresses. Codecov here is
# used only for reporting/visualization, so its own status checks are marked
# informational and never block a pull request on their own.
coverage:
  status:
    project:
      default:
        informational: true
    patch:
      default:
        informational: true

comment:
  layout: "reach, diff, files"
  require_changes: true
