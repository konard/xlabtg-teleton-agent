openapi: 3.1.0
info:
  title: Teleton Management API
  version: 1.0.0
  description: >-
    HTTPS management API for remote administration of a Teleton agent —
    lifecycle control, configuration, monitoring and the stable WebUI route
    surface mounted under `/v1`.


    All `/v1/*` routes require a `tltn_`-prefixed bearer token. Errors follow
    [RFC 9457 Problem Detail](https://www.rfc-editor.org/rfc/rfc9457).
  contact:
    name: Teleton
    url: https://github.com/xlabtg/teleton-agent
  license:
    name: MIT
    url: https://github.com/xlabtg/teleton-agent/blob/main/LICENSE
servers:
  - url: https://localhost:7778
    description: Management API server
tags:
  - name: Health
    description: Liveness and readiness probes (no authentication).
  - name: Metrics
    description: Operational metrics.
  - name: Agent Lifecycle
    description: Start, stop, restart and observe the agent.
  - name: Managed Agents
    description: Managed agent fleet administration.
  - name: Analytics
    description: Usage analytics.
  - name: Anomalies
    description: Anomaly detection data.
  - name: Logs
    description: Recent log lines and live log streaming.
  - name: Sessions
    description: Chat session maintenance (deletion and pruning).
  - name: Audit
    description: Audit trail search and stream.
  - name: Auth
    description: API key validation.
  - name: Autonomous
    description: Autonomous task queue and policy routes.
  - name: Cache
    description: Predictive cache inspection and controls.
  - name: Configuration
    description: Configuration read/write.
  - name: Temporal Context
    description: Temporal context analytics.
  - name: Dashboards
    description: Dynamic dashboard layout and widgets.
  - name: Events
    description: Internal event bus stream.
  - name: Export/Import
    description: Safe configuration and prompt export/import.
  - name: Feedback
    description: User feedback collection.
  - name: Health Check
    description: Composite application health checks.
  - name: Hooks
    description: Hook management.
  - name: Integrations
    description: Third-party integrations.
  - name: Conversation Logs
    description: Conversation logs.
  - name: Marketplace
    description: Plugin marketplace.
  - name: MCP
    description: MCP server configuration.
  - name: Memory
    description: Memory search and management.
  - name: Agent Network
    description: Agent network registry and delegation routes.
  - name: Notifications
    description: In-app notifications and unread counts.
  - name: Meta
    description: Machine-readable API contract.
  - name: Pipelines
    description: Pipeline definitions and execution.
  - name: Plugins
    description: Plugin management.
  - name: Predictions
    description: Prediction service data.
  - name: Prompts
    description: Prompt library management.
  - name: Security
    description: Security status and zero-trust policy data.
  - name: Self-Improvement
    description: Self-improvement run history and controls.
  - name: Chat Sessions
    description: Chat session search and inspection.
  - name: Setup
    description: Setup wizard (works without a running agent).
  - name: Soul
    description: System prompt (read-only).
  - name: Status
    description: Agent status and metrics.
  - name: System
    description: Runtime version and host system information.
  - name: Tasks
    description: Scheduled tasks.
  - name: TON Proxy
    description: TON Proxy control.
  - name: Tools
    description: Tool inventory and configuration.
  - name: Webhooks
    description: Outbound webhook management.
  - name: Widgets
    description: Widget generator routes.
  - name: Workflows
    description: Workflow definitions and scheduling.
  - name: Workspace
    description: Workspace file management.
security:
  - BearerAuth: []
paths:
  /healthz:
    get:
      tags:
        - Health
      summary: Liveness probe
      operationId: get_healthz
      description: 'Always returns `{ "status": "ok" }`. No authentication required.'
      responses:
        "200":
          description: Service is alive
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
        "500":
          $ref: "#/components/responses/InternalError"
      security: []
  /metrics:
    get:
      tags:
        - Metrics
      summary: Get /metrics
      operationId: get_metrics
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "500":
          $ref: "#/components/responses/InternalError"
      security: []
  /readyz:
    get:
      tags:
        - Health
      summary: Readiness probe
      operationId: get_readyz
      description: Returns `200` when the agent is running, otherwise `503` with setup
        completeness. No authentication required.
      responses:
        "200":
          description: Agent is running and ready
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ready
                  state:
                    type: string
                    example: running
        "500":
          $ref: "#/components/responses/InternalError"
      security: []
  /v1/agent/events:
    get:
      tags:
        - Agent Lifecycle
      summary: Stream lifecycle events (SSE)
      operationId: get_v1_agent_events
      description: Server-Sent Events stream of agent state changes. A `ping` event is
        sent every 30s.
      responses:
        "200":
          description: SSE stream of `status` and `ping` events
          content:
            text/event-stream:
              schema:
                type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
      security:
        - BearerAuth: []
  /v1/agent/restart:
    post:
      tags:
        - Agent Lifecycle
      summary: Restart the agent
      operationId: post_v1_agent_restart
      description: Stop then start (fire-and-forget). Returns `409` during transitions.
      responses:
        "200":
          description: Agent restarting
          content:
            application/json:
              schema:
                type: object
                properties:
                  state:
                    type: string
                    example: restarting
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
      security:
        - BearerAuth: []
  /v1/agent/start:
    post:
      tags:
        - Agent Lifecycle
      summary: Start the agent
      operationId: post_v1_agent_start
      description: Fire-and-forget. Returns `409` if the agent is already running or
        stopping.
      responses:
        "200":
          description: Agent transitioning to running
          content:
            application/json:
              schema:
                type: object
                properties:
                  state:
                    type: string
                    example: starting
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
      security:
        - BearerAuth: []
  /v1/agent/status:
    get:
      tags:
        - Agent Lifecycle
      summary: Agent status
      operationId: get_v1_agent_status
      responses:
        "200":
          description: Current lifecycle state
          content:
            application/json:
              schema:
                type: object
                properties:
                  state:
                    type: string
                    enum:
                      - stopped
                      - starting
                      - running
                      - stopping
                  uptime:
                    type:
                      - number
                      - "null"
                    description: Seconds since start, or null
                  error:
                    type:
                      - string
                      - "null"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
      security:
        - BearerAuth: []
  /v1/agent/stop:
    post:
      tags:
        - Agent Lifecycle
      summary: Stop the agent
      operationId: post_v1_agent_stop
      description: Fire-and-forget. Returns `409` if the agent is already stopped or
        starting.
      responses:
        "200":
          description: Agent transitioning to stopped
          content:
            application/json:
              schema:
                type: object
                properties:
                  state:
                    type: string
                    example: stopping
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
