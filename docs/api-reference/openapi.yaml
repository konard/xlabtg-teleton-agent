components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: "`tltn_`-prefixed API key issued at first start or via `teleton
        api-rotate-key`."
  schemas:
    ProblemDetail:
      type: object
      description: RFC 9457 Problem Detail object.
      properties:
        type:
          type: string
          default: about:blank
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
      required:
        - title
        - status
  responses:
    BadRequest:
      description: Malformed request
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetail"
    Unauthorized:
      description: Missing, malformed or invalid API key
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetail"
    Forbidden:
      description: Source IP is not in the whitelist
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetail"
    NotFound:
      description: Resource not found
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetail"
    Conflict:
      description: State conflict (e.g. agent already running)
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetail"
    TooManyRequests:
      description: Rate limit or brute-force block exceeded
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetail"
    InternalError:
      description: Unexpected server error
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetail"
    ServiceUnavailable:
      description: Agent subsystem not available (agent not running)
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetail"
