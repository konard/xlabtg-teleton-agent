name: Release

on:
  push:
    tags: ["v*"]

# Least-privilege defaults; jobs opt into the extra scopes they need
# (id-token / attestations for SLSA build provenance, packages for GHCR).
permissions:
  contents: read

jobs:
  # ---- Build & Verify ----
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: cd web && npm ci
      - run: npm run build -w packages/sdk
      - run: npm run typecheck
      - run: npm run build
      - run: node dist/cli/index.js --help

      - name: Run tests
        run: npx vitest run

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

      # ---- SBOM (Software Bill of Materials) ----
      # Required by NIST SSDF / EU CRA and common in enterprise procurement.
      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@v0
        with:
          format: spdx-json
          output-file: teleton-agent.spdx.json
          artifact-name: teleton-agent.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: teleton-agent.spdx.json

  # ---- Publish to npm ----
  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required for npm to generate and publish provenance attestation.
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Check if version already published
        id: check
        run: |
          LOCAL=$(node -p "require('./package.json').version")
          REMOTE=$(npm view teleton version 2>/dev/null || echo "0.0.0")
          echo "local=$LOCAL remote=$REMOTE"
          if [ "$LOCAL" != "$REMOTE" ]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
          fi

      - run: npm ci
        if: steps.check.outputs.publish == 'true'
      - run: cd web && npm ci
        if: steps.check.outputs.publish == 'true'

      - uses: actions/download-artifact@v4
        if: steps.check.outputs.publish == 'true'
        with:
          name: dist
          path: dist/

      # --provenance attaches a signed SLSA provenance statement to the npm
      # package, verifiable via `npm audit signatures` and on npmjs.com.
      - run: npm publish --provenance --access public
        if: steps.check.outputs.publish == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ---- Publish SDK to npm (if version changed) ----
  publish-sdk:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Check if SDK version needs publishing
        id: check
        run: |
          LOCAL=$(node -p "require('./packages/sdk/package.json').version")
          REMOTE=$(npm view @teleton-agent/sdk version 2>/dev/null || echo "0.0.0")
          echo "local=$LOCAL" >> "$GITHUB_OUTPUT"
          echo "remote=$REMOTE" >> "$GITHUB_OUTPUT"
          if [ "$LOCAL" != "$REMOTE" ]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install root deps (for @types/node hoisting)
        if: steps.check.outputs.publish == 'true'
        run: npm ci

      - name: Build and publish SDK
        if: steps.check.outputs.publish == 'true'
        run: npm run build -w packages/sdk && cd packages/sdk && npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ---- Publish Docker image (multi-arch + cosign signature) ----
  publish-docker:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      # Required for keyless cosign signing and SLSA build provenance attestation.
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name
        id: image
        run: echo "repo=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Extract Docker metadata (tags + OCI labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.image.outputs.repo }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push Docker image (linux/amd64, linux/arm64)
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign the published image (keyless / OIDC)
        env:
          COSIGN_EXPERIMENTAL: "1"
          DIGEST: ${{ steps.push.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          for tag in $TAGS; do
            cosign sign --yes "${tag}@${DIGEST}"
          done

      # SLSA Level 1 build provenance for the published image; verifiable with
      # `gh attestation verify oci://ghcr.io/<repo>:<version> --owner <owner>`.
      - name: Attest image build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/${{ steps.meta.outputs.repo }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  # ---- GitHub Release ----
  create-release:
    needs: [build, publish-npm]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      # Required for SLSA build provenance attestation of the release tarball.
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Check if release already exists
        id: check
        run: |
          if gh release view "$GITHUB_REF_NAME" &>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download dist artifact
        if: steps.check.outputs.exists == 'false'
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Download SBOM artifact
        if: steps.check.outputs.exists == 'false'
        uses: actions/download-artifact@v4
        with:
          name: sbom

      - name: Pack release tarball
        if: steps.check.outputs.exists == 'false'
        id: pack
        run: |
          FILE=$(npm pack --silent)
          echo "tarball=$FILE" >> "$GITHUB_OUTPUT"

      # SLSA Level 1 build provenance for the release tarball and SBOM.
      # Verify with: `gh attestation verify <tarball> --owner <owner>`.
      - name: Attest release artifacts
        if: steps.check.outputs.exists == 'false'
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            ${{ steps.pack.outputs.tarball }}
            teleton-agent.spdx.json

      - name: Generate changelog
        if: steps.check.outputs.exists == 'false'
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | head -2 | tail -1)
          if [ -z "$PREV_TAG" ]; then
            LOG=$(git log --oneline)
          else
            LOG=$(git log --oneline "$PREV_TAG"..HEAD)
          fi
          echo "log<<EOF" >> "$GITHUB_OUTPUT"
          echo "$LOG" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ${{ steps.pack.outputs.tarball }}
            teleton-agent.spdx.json
          body: |
            ## Install

            **npm:**
            ```bash
            npm install -g teleton
            ```

            **Docker:**
            ```bash
            docker run -it -v ~/.teleton:/data ghcr.io/${{ github.repository }}:latest setup
            ```

            ## Changes
            ${{ steps.changelog.outputs.log }}
