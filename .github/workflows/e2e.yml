name: E2E

on:
  pull_request:
    branches: [main]
  pull_request_target:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.event.pull_request.number || github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  # ---- WebUI end-to-end smoke tests (Playwright) ----
  e2e:
    name: E2E / WebUI (Playwright)
    runs-on: ubuntu-latest
    # Gated behind the RUN_E2E flag and skipped on forks (no access to secrets).
    # Set the `RUN_E2E` repository variable to `true` to enable the suite.
    # Same-repo PRs run via `pull_request`; fork PRs would run via
    # `pull_request_target`, but those are skipped because they lack secrets.
    if: |
      vars.RUN_E2E == 'true' &&
      (github.event_name != 'pull_request_target' ||
       github.event.pull_request.head.repo.full_name != github.repository)
    env:
      RUN_E2E: ${{ vars.RUN_E2E }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install WebUI dependencies
        run: cd web && npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E suite
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.event.pull_request.head.sha || github.sha }}
          path: playwright-report/
          retention-days: 7

      - name: Upload failure screenshots and traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results-${{ github.event.pull_request.head.sha || github.sha }}
          path: test-results/
          retention-days: 7
