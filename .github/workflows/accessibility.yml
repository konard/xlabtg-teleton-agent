name: accessibility

# WCAG 2.1 AA accessibility gate for the WebUI (issue #499).
# Runs the @axe-core/playwright audit over every WebUI route and fails the
# build on any critical or serious violation. The machine-readable baseline is
# always uploaded as an artifact for review.

on:
  pull_request:
    paths:
      - "web/**"
      - ".github/workflows/accessibility.yml"
  push:
    branches:
      - main
    paths:
      - "web/**"
      - ".github/workflows/accessibility.yml"

permissions:
  contents: read

jobs:
  accessibility:
    name: WCAG 2.1 AA audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright (Chromium)
        run: npx playwright install --with-deps chromium

      - name: Build WebUI
        run: npm run build

      - name: Run accessibility audit
        run: npm run test:a11y

      - name: Upload accessibility report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a11y-report
          path: web/a11y-report
          if-no-files-found: warn
