name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  pull_request_target:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

# Least privilege. The notify job authenticates to Telegram via its own secrets,
# not GITHUB_TOKEN, so read-only repo access is enough everywhere.
permissions:
  contents: read

jobs:
  # ---- Build Runtime (Node 20 + 22) ----
  build-runtime:
    name: CI / Build (Runtime)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # Skip pull_request_target for same-repo PRs to avoid duplicate runs with pull_request
    if: |
      github.event_name != 'pull_request_target' ||
      github.event.pull_request.head.repo.full_name != github.repository

    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            web/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install WebUI dependencies
        run: cd web && npm ci

      # `vite build` transpiles via esbuild and performs NO type checking, so
      # type errors in web/src/** would otherwise escape CI entirely. Run the
      # TypeScript compiler in --noEmit mode against the WebUI to catch them
      # before the build (fast-fail) on every push and pull request.
      - name: Type check WebUI
        run: cd web && npm run typecheck

      - name: Check i18n translation parity
        run: cd web && npm run check:i18n

      - name: Build SDK workspace
        run: npm run build -w packages/sdk

      - name: Build full project
        run: npm run build

      - name: CLI smoke test
        run: node dist/cli/index.js --help

      - name: Upload build artifacts
        if: matrix.node-version == 20
        uses: actions/upload-artifact@v4
        with:
          name: dist-ci-${{ github.event.pull_request.head.sha || github.sha }}
          path: dist/
          retention-days: 7

  # ---- Build SDK with DTS ----
  build-sdk:
    name: CI / Build (SDK with DTS)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Skip pull_request_target for same-repo PRs to avoid duplicate runs with pull_request
    if: |
      github.event_name != 'pull_request_target' ||
      github.event.pull_request.head.repo.full_name != github.repository

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Build SDK with type declarations
        run: npm run build -w packages/sdk

      - name: Verify DTS output
        run: |
          if [ ! -f "packages/sdk/dist/index.d.ts" ]; then
            echo "Error: TypeScript declarations not generated"
            exit 1
          fi
          echo "DTS generated successfully: packages/sdk/dist/index.d.ts"

  # ---- Lint + static analysis ----
  lint:
    name: CI / Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'pull_request_target' &&
       github.event.pull_request.head.repo.full_name != github.repository)

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Build SDK (required for lint)
        run: npm run build -w packages/sdk

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Dead code check
        run: npm run knip

      - name: Circular dependency check
        run: npm run circular

  # ---- OpenAPI spec ----
  openapi:
    name: CI / OpenAPI
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'pull_request_target' &&
       github.event.pull_request.head.repo.full_name != github.repository)

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Build SDK (required for spec generation)
        run: npm run build -w packages/sdk

      - name: Regenerate OpenAPI spec
        run: npm run generate:openapi

      - name: Verify committed spec is up to date
        run: |
          if ! git diff --quiet -- docs/api-reference; then
            echo "::error::docs/api-reference is out of date. Run 'npm run generate:openapi' and commit the result."
            git --no-pager diff -- docs/api-reference
            exit 1
          fi

      - name: Lint OpenAPI spec
        run: npm run lint:openapi

  # ---- Tests ----
  test:
    name: CI / Test
    runs-on: ubuntu-latest
    timeout-minutes: 25
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'pull_request_target' &&
       github.event.pull_request.head.repo.full_name != github.repository)

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Build SDK workspace
        run: npm run build -w packages/sdk

      - name: Test with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.event.pull_request.head.sha }}
          path: coverage/
          retention-days: 7

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage/lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
        continue-on-error: true

      - name: Coverage summary
        run: |
          echo "## Test Coverage" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat coverage/coverage-summary.json | node -e "
            const d = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).total;
            console.log('Statements : ' + d.statements.pct + '%');
            console.log('Branches   : ' + d.branches.pct + '%');
            console.log('Functions  : ' + d.functions.pct + '%');
            console.log('Lines      : ' + d.lines.pct + '%');
          " || cat coverage/coverage-summary.json
          echo '```' >> "$GITHUB_STEP_SUMMARY"

  # ---- TypeScript check ----
  typecheck:
    name: CI / TypeScript
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'pull_request_target' &&
       github.event.pull_request.head.repo.full_name != github.repository)

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Build SDK (required for typecheck)
        run: npm run build -w packages/sdk

      - name: Type check
        run: npm run typecheck

  # ---- Security audit ----
  security:
    name: Security audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Skip pull_request_target for same-repo PRs to avoid duplicate runs with pull_request
    if: |
      github.event_name != 'pull_request_target' ||
      github.event.pull_request.head.repo.full_name != github.repository

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Security audit
        run: npm run audit:ci

  # ---- Deployment artifacts (Compose + Helm) ----
  deploy-artifacts:
    name: CI / Deploy artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Skip pull_request_target for same-repo PRs to avoid duplicate runs with pull_request
    if: |
      github.event_name != 'pull_request_target' ||
      github.event.pull_request.head.repo.full_name != github.repository

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Validate Docker Compose file
        run: docker compose -f compose.yaml config --quiet

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint Helm chart
        run: helm lint ./helm/teleton-agent

      - name: Render Helm templates (default + credentials)
        run: |
          helm template teleton ./helm/teleton-agent > /dev/null
          helm template teleton ./helm/teleton-agent \
            --set secrets.TELETON_API_KEY=dummy \
            --set existingSecret="" > /dev/null

  # ---- Push-only quality checks (lint + typecheck + tests on main) ----
  push-quality:
    name: CI / Quality (push)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Build SDK workspace
        run: npm run build -w packages/sdk

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test with coverage
        run: npm run test:coverage

  # ---- Deploy to Vercel (fork PRs via pull_request_target only, needs secrets) ----
  deploy-vercel:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: [build-runtime, typecheck]
    if: |
      github.event_name == 'pull_request_target' &&
      github.event.pull_request.head.repo.full_name != github.repository
    environment:
      name: pr-preview
      url: ${{ steps.deploy.outputs.preview-url }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-ci-${{ github.event.pull_request.head.sha }}
          path: dist/

      - name: Install WebUI dependencies
        run: cd web && npm ci

      - name: Build WebUI
        run: cd web && npm run build

      - name: Deploy to Vercel
        id: deploy
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./web
          scope: ${{ secrets.VERCEL_ORG_ID }}
        continue-on-error: true

      - name: Skip note (no Vercel secrets)
        if: steps.deploy.outcome == 'skipped' || steps.deploy.outcome == 'failure'
        run: echo "Vercel deploy skipped — VERCEL_TOKEN / VERCEL_ORG_ID / VERCEL_PROJECT_ID secrets not configured"

  # ---- Telegram notification (after the full CI passes, pushes only) ----
  # dev  : one message PER COMMIT, prefixed [DEV], paced 1/sec.
  # main : one clean summary of how many stable commits were merged.
  # Both walk the push range (before..after), not just the HEAD commit.
  notify:
    needs: [push-quality]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Notify Telegram
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.sha }}
        run: |
          set -uo pipefail
          ZERO=0000000000000000000000000000000000000000

          # Resolve the commits in this push, oldest -> newest (merge commits excluded).
          # Fallbacks (first push / force-push / unknown before) -> HEAD only.
          if [ "$BEFORE" = "$ZERO" ] \
             || ! git cat-file -e "${BEFORE}^{commit}" 2>/dev/null \
             || ! git merge-base --is-ancestor "$BEFORE" "$AFTER" 2>/dev/null; then
            SHAS=$(git log -1 --format=%H "$AFTER")
            RANGE_OK=0
          else
            SHAS=$(git log --reverse --no-merges --format=%H "${BEFORE}..${AFTER}")
            RANGE_OK=1
          fi

          COUNT=$(printf '%s\n' "$SHAS" | grep -c . || true)
          if [ "$COUNT" -eq 0 ]; then echo "Nothing to notify"; exit 0; fi

          esc() { printf '%s' "$1" | sed -e 's/&/\&amp;/g' -e 's/</\&lt;/g' -e 's/>/\&gt;/g'; }
          # Send one message, retrying until Telegram accepts it. IMPORTANT: no
          # curl --fail here — on a 429 we must READ the body to get retry_after;
          # --fail discards it, which silently drops rate-limited messages.
          send() {
            local text="$1" attempt resp ra
            for attempt in 1 2 3 4 5 6; do
              resp=$(curl -sS -m 25 -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
                -d chat_id="${TG_CHAT}" -d parse_mode=HTML -d disable_web_page_preview=true \
                --data-urlencode "text=${text}" 2>/dev/null || true)
              case "$resp" in
                *'"ok":true'*) return 0 ;;
              esac
              # 429 -> honor retry_after; other transient error -> small backoff.
              ra=$(printf '%s' "$resp" | grep -o '"retry_after":[0-9]*' | grep -o '[0-9]*' || true)
              sleep "$(( ${ra:-2} + 1 ))"
            done
            echo "WARN: gave up sending after retries: ${text%%$'\n'*}"
            return 1
          }

          if [ "$BRANCH" = "main" ]; then
            # Clean summary: number of stable commits merged to main.
            noun="commits"; [ "$COUNT" -eq 1 ] && noun="commit"
            if [ "$RANGE_OK" = 1 ]; then
              link="https://github.com/${REPO}/compare/${BEFORE}...${AFTER}"
            else
              link="https://github.com/${REPO}/commit/${AFTER}"
            fi
            send "🟢 <b>${COUNT}</b> stable ${noun} merged to <b>main</b>"$'\n'"<a href=\"${link}\">View changes</a>"
          else
            # Per-commit feed for dev (and any other non-main branch), [DEV] prefixed.
            tag="[${BRANCH^^}]"
            if [ "$COUNT" -gt 1 ]; then
              send "📦 <b>${COUNT}</b> commits pushed to <b>${BRANCH}</b>"
              sleep 1
            fi
            for sha in $SHAS; do
              title=$(esc "$(git log -1 --format=%s "$sha")")
              url="https://github.com/${REPO}/commit/${sha}"
              send "${tag} <b>${title}</b>"$'\n'"<a href=\"${url}\">${sha:0:7}</a>"
              sleep 1
            done
          fi
