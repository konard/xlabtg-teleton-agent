name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install WebUI dependencies
        run: cd web && npm ci

      - name: Build SDK workspace
        run: npm run build -w packages/sdk

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Dead code check
        run: npm run knip

      - name: Circular dependency check
        run: npm run circular

      - name: Duplicate code check
        run: npm run dupcheck

      - name: Build
        run: npm run build

      - name: Test with coverage
        run: npm run test:coverage

      - name: Security audit
        run: npm run audit:ci

      - name: CLI smoke test
        run: node dist/cli/index.js --help

  # ---- Telegram notification: one message PER COMMIT, paced 1/sec ----
  # Runs only after the full CI matrix passes, and only on pushes (not PRs).
  # Uses the push range (before..after) so EVERY commit in the push is sent,
  # not just the HEAD commit.
  notify:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Notify Telegram per commit (1 msg/sec)
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
          REPO: ${{ github.repository }}
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.sha }}
        run: |
          set -uo pipefail
          ZERO=0000000000000000000000000000000000000000

          # Resolve the list of commits in this push, oldest -> newest.
          # Fallbacks (first push / force-push / unknown before) -> HEAD only.
          if [ "$BEFORE" = "$ZERO" ] \
             || ! git cat-file -e "${BEFORE}^{commit}" 2>/dev/null \
             || ! git merge-base --is-ancestor "$BEFORE" "$AFTER" 2>/dev/null; then
            SHAS=$(git log -1 --format=%H "$AFTER")
          else
            SHAS=$(git log --reverse --no-merges --format=%H "${BEFORE}..${AFTER}")
          fi

          COUNT=$(printf '%s\n' "$SHAS" | grep -c . || true)
          if [ "$COUNT" -eq 0 ]; then echo "Nothing to notify"; exit 0; fi

          esc() { printf '%s' "$1" | sed -e 's/&/\&amp;/g' -e 's/</\&lt;/g' -e 's/>/\&gt;/g'; }
          send() {
            local text="$1" resp ra
            resp=$(curl -fsS -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
              -d chat_id="${TG_CHAT}" -d parse_mode=HTML -d disable_web_page_preview=true \
              --data-urlencode "text=${text}" 2>/dev/null || true)
            # Honor Telegram 429 back-off, then retry once.
            ra=$(printf '%s' "$resp" | grep -o '"retry_after":[0-9]*' | grep -o '[0-9]*' || true)
            if [ -n "$ra" ]; then
              sleep "$((ra + 1))"
              curl -fsS -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
                -d chat_id="${TG_CHAT}" -d parse_mode=HTML -d disable_web_page_preview=true \
                --data-urlencode "text=${text}" >/dev/null 2>&1 || true
            fi
          }

          if [ "$COUNT" -gt 1 ]; then
            send "📦 <b>${COUNT}</b> commits pushed to <b>main</b>"
            sleep 1
          fi

          i=0
          for sha in $SHAS; do
            i=$((i + 1))
            title=$(esc "$(git log -1 --format=%s "$sha")")
            url="https://github.com/${REPO}/commit/${sha}"
            send "[${i}/${COUNT}] <b>${title}</b>"$'\n'"<a href=\"${url}\">${sha:0:7}</a>"
            sleep 1
          done
